<!DOCTYPE html>
<html>
<head>
    <title>Policy Calculator</title>
</head>
<body>

<h2>Policy Calculator</h2>

<form id="policyForm">

    <label>DOB:</label>
    <input type="date" name="dob" required><br><br>

    <label>Gender:</label>
    <select name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select><br><br>

    <label>Premium:</label>
    <input type="number" name="premium" required><br><br>

    <label>Policy Term (PT):</label>
    <input type="number" name="pt" required><br><br>

    <label>PPT:</label>
    <input type="number" name="ppt" required><br><br>

    <label>Frequency:</label>
    <select name="frequency">
        <option value="Yearly">Yearly</option>
        <option value="Half-Yearly">Half-Yearly</option>
        <option value="Monthly">Monthly</option>
    </select><br><br>

    <label>Sum Assured:</label>
    <input type="number" name="sum_assured" required><br><br>

    <button type="submit">Calculate</button>

</form>

<hr>

<h3>Result</h3>
<pre id="output"></pre>

<script>
document.getElementById("policyForm").onsubmit = async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    // Convert numbers
    data.premium = Number(data.premium);
    data.pt = Number(data.pt);
    data.ppt = Number(data.ppt);
    data.sum_assured = Number(data.sum_assured);

    const res = await fetch("/policy/calculate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(result, null, 2);
};
</script>

</body>
</html>
